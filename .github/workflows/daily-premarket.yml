name: 每日盘前简报 

on:
  schedule:
    # 两个触发点分别对应EDT(夏令时)和EST(冬令时)下的"8:30 ET",
    # 脚本内部会用纽约时间自动判断哪一个才是真正要执行的, 另一个会自动跳过。
    # 你不需要每年手动切换。
    - cron: "30 12 * * 1-5"   # 8:30 ET 若当前是夏令时(EDT, UTC-4)
    - cron: "30 13 * * 1-5"   # 8:30 ET 若当前是冬令时(EST, UTC-5)
    - cron: "10 18 * * 1-5"   # 临时测试用: 今天下午2:10 ET
  workflow_dispatch: {}        # 手动点一下立即触发, 不受时间判断限制, 方便随时测试

permissions:
  contents: write   # 需要把生成的网页文件提交回仓库, 供 GitHub Pages 发布

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行脚本
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DISCORD_WEBHOOK_DAILY: ${{ secrets.DISCORD_WEBHOOK_DAILY }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        run: python main.py --mode daily

      - name: 把生成的网页提交回仓库 (供GitHub Pages发布)
        run: |
          git config user.name "market-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A docs/ || true
          git diff --cached --quiet || git commit -m "chore: 更新每日盘前简报网页 [skip ci]"
          git push
