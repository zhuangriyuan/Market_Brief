name: 每日盘前简报

on:
  workflow_dispatch: {}   # 现在由外部的cron-job.org主动触发, 不再依赖GitHub自己的schedule
                          # (这个仓库的原生schedule触发器测试多次确认无法正常工作, 详见README)

permissions:
  contents: write

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行脚本
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DISCORD_WEBHOOK_DAILY: ${{ secrets.DISCORD_WEBHOOK_DAILY }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        run: python main.py --mode daily

      - name: 把生成的网页提交回仓库 (供GitHub Pages发布)
        run: |
          git config user.name "market-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A docs/ || true
          git diff --cached --quiet || git commit -m "chore: 更新每日盘前简报网页 [skip ci]"
          git push
