name: 每周市场总结

on:
  schedule:
    - cron: "0 22 * * 0"   # 18:00 ET 若当前是夏令时(EDT, UTC-4), 周日
    - cron: "0 23 * * 0"   # 18:00 ET 若当前是冬令时(EST, UTC-5), 周日
    - cron: "30 18 * * 1-5"   # 临时测试用: 今天下午2:30 ET
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行脚本
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DISCORD_WEBHOOK_WEEKLY: ${{ secrets.DISCORD_WEBHOOK_WEEKLY }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        run: python main.py --mode weekly

      - name: 把生成的网页提交回仓库 (供GitHub Pages发布)
        run: |
          git config user.name "market-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A docs/ || true
          git diff --cached --quiet || git commit -m "chore: 更新每周市场展望网页 [skip ci]"
          git push
